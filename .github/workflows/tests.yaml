name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  canceller:
    runs-on: ubuntu-24.04
    steps:
      - name: cancel previous runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

  tests:

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
        python-version: ["3.12", "3.14"]
    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}

    steps:
      - name: checkout
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: true
          version: "latest"
          python-version: ${{ matrix.python }}

      - name: Install python dependencies
        run: |
          # uv sync install the project into the venv
          # and the -p installs the correct Python
          # version if it is not the version in $PATH
          uv sync -p ${{ matrix.python-version }} --frozen --group test
          demes -h

      - name: run pytest
        run: |
          uv run -m pytest -n auto \
            --cov=demes --cov-report=term-missing --cov-report=xml -v tests

      - name: upload coverage report to codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          env_vars: OS,PYTHON
